# Fix for localhost SSL - disable certificate verification for development
server {
    listen 443 ssl http2;
    server_name localhost;
    
    # SSL Certificate Configuration (using Certbot certificates)
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;
    
    # SSL Settings - more permissive for localhost
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    
    # Disable certificate verification for localhost development
    ssl_verify_client off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers (reduced for localhost)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Root directory
    root /var/www/moodle/public;
    index index.php index.html index.htm;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml text/javascript application/x-javascript application/xml+rss;
    
    # Browser caching for static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }
    
    # PHP processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        client_max_body_size 100M;
        include /etc/nginx/conf.d/php_params.conf;
    }
    
    # Handle static files (HTML, CSS, JS, images)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Moodle admin directory
    location ~ ^/admin/.*\.php$ {
        try_files $uri =404;
        fastcgi_send_timeout 600;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
    }
    
    # Moodle-specific locations
    location /moodle/ {
        alias /var/www/moodle/public/;
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Security - Hide sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~* \.(conf|ini|log|sh|sql|bak)$ {
        deny all;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
