# Complete Moodle Nginx Configuration
# Consolidated single configuration file for all HTTP/HTTPS servers

# Rate limiting zone definition
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# HTTP server - default catch-all
server {
    listen 80 default_server;
    server_name _;
    
    # Root directory and index files
    root /var/www/moodle/public;
    index index.php index.html index.htm;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Browser caching for static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        access_log off;
    }
    
    # Browser caching for media files
    location ~* \.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|tar|gz)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self'; frame-ancestors 'self'; form-action 'self';" always;
    
    # Handle root requests
    location = / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Handle Moodle-specific PHP scripts with path info
    location ~ ^/lib/javascript\.php/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/lib/javascript.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    
    location ~ ^/theme/styles\.php/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/theme/styles.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    
    location ~ ^/theme/image\.php/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/theme/image.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    
    # Handle regular PHP files
    location ~ \.php$ {
        limit_req zone=general burst=50 nodelay;
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        
        # Moodle-specific settings
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M \n max_execution_time=300 \n max_input_time=300 \n memory_limit=1G";
    }
    
    # Handle static files (HTML, CSS, JS, images)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Moodle admin directory with rate limiting
    location ~ ^/admin/.*\.php$ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri =404;
        fastcgi_send_timeout 600;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        
        # Moodle-specific settings
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M \n max_execution_time=300 \n max_input_time=300 \n memory_limit=1G";
    }
    
    # Security - Hide sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~* \.(conf|ini|log|sh|sql|bak)$ {
        deny all;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# HTTP to HTTPS redirect for localhost
server {
    listen 80;
    server_name localhost;
    
    return 301 https://$server_name$request_uri;
}

# HTTPS server for localhost with SSL configuration
server {
    listen 443 ssl http2;
    server_name localhost;
    
    # Root directory and index files
    root /var/www/moodle/public;
    index index.php index.html index.htm;
    
    # SSL Certificate Configuration (using Certbot certificates)
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;
    
    # SSL Settings - strong configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers on;
    
    # SSL session configuration
    ssl_verify_client off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HTTPS-specific security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
