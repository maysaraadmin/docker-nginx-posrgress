# Rate limiting zone definition
limit_req_zone $binary_remote_addr zone=general:10m rate=${NGINX_RATE_LIMIT_REQUESTS_PER_SECOND:-10}r/s;

server {
    listen 80 default_server;
    server_name _;
    
    # Include common Moodle configuration
    include /etc/nginx/conf.d/moodle-common.conf;
}

# HTTP to HTTPS redirect for localhost only
server {
    listen 80;
    server_name localhost;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# SSL Configuration for HTTPS
include /etc/nginx/conf.d/fix-localhost.conf;
