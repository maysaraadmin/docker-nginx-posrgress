services:
  postgres:
    image: postgres:15                # Debian-based (not -alpine)
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.24               # Debian-based (not -alpine)
    container_name: nginx_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./php:/var/www/php:ro
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      php:
        condition: service_started

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: php_fpm
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./php:/var/www/html

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: database_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RATE_LIMIT: ${RATE_LIMIT:-100/hour}
      NGINX_CONFIG_PATH: ${NGINX_CONFIG_PATH:-/etc/nginx/nginx.conf}
      NGINX_SITE_CONFIG_PATH: ${NGINX_SITE_CONFIG_PATH:-/etc/nginx/conf.d/default.conf}
      NGINX_ACCESS_LOG: ${NGINX_ACCESS_LOG:-/var/log/nginx/access.log}
      NGINX_ERROR_LOG: ${NGINX_ERROR_LOG:-/var/log/nginx/error.log}
    ports:
      - "5000:5000"
      - "5001:5001"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/logs:/app/logs
      - ./api/config:/app/config:ro

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge