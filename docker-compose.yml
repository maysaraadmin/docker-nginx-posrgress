services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-moodle}
    secrets:
      - postgres_user
      - postgres_password
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT}
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodle_admin -d moodle"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: php_fpm
    restart: unless-stopped
    env_file: .env
    environment:
      MOODLE_DATA_DIR: /var/www/moodledata
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-1G}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME_SECONDS:-300}
      UPLOAD_MAX_FILESIZE: ${UPLOAD_MAX_FILESIZE:-100M}
      POST_MAX_SIZE: ${POST_MAX_SIZE:-100M}
    secrets:
      - postgres_user
      - postgres_password
      - redis_password
    deploy:
      resources:
        limits:
          memory: ${PHP_MEMORY_LIMIT}
          cpus: '${PHP_CPU_LIMIT}'
        reservations:
          memory: ${PHP_MEMORY_LIMIT_RESERVATION}
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./moodle/config.php:/var/www/moodle/config.php:ro
      - ./moodle:/var/www/moodle:ro
      - ./moodledata:/var/www/moodledata:rw
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    build: ./nginx
    container_name: nginx_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "9999:9999"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./moodle:/var/www/moodle:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass-file /run/secrets/redis_password
    secrets:
      - redis_password
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT}
        reservations:
          memory: 256M
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    env_file: .env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$(cat /run/secrets/redis_password)", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5.4.2
    container_name: adminer_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-backup:
    image: postgres:15
    container_name: postgres_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - ./backups:/backups
    networks:
      - backend
    command: >
      sh -c "
      while true; do
        pg_dump -h postgres -U $$(cat /run/secrets/postgres_user) \
        -d $$(cat /run/secrets/postgres_password) moodle > \
        /backups/moodle_backup_$$(date +%Y%m%d_%H%M%S).sql
        echo 'Backup completed at' $$(date)
        sleep 86400
      done
      "
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true