services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: php_fpm
    restart: unless-stopped
    env_file: .env
    environment:
      MOODLE_DATA_DIR: /var/www/moodledata
    volumes:
      - ./moodle:/var/www/moodle:rw
      - ./moodledata:/var/www/moodledata:rw
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    # Healthcheck moved to Dockerfile to avoid duplication & conflicts

  nginx:
    build: ./nginx
    container_name: nginx_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./moodle:/var/www/moodle
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      php:
        condition: service_healthy
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    env_file: .env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5.4.2
    container_name: adminer_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  certbot:
    image: certbot/certbot:v5.5.0 # ✅ Fixed invalid v5.5.0 tag
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: >
      sh -c "
      if [ ! -f /etc/letsencrypt/live/${CERTBOT_DOMAIN}/fullchain.pem ]; then
        certbot certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email -d ${CERTBOT_DOMAIN} -d www.${CERTBOT_DOMAIN};
      fi &&
      trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;
      "
    env_file: .env
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge