# PostgreSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: moodle
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard  # Adjust based on your cloud provider
  resources:
    requests:
      storage: 20Gi   # increased from 10Gi for better capacity