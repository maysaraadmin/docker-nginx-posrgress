# Moodle data (user files, logs, sessions)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: moodledata-pvc
  namespace: moodle
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard  # Adjust based on your cloud provider
  resources:
    requests:
      storage: 50Gi   # adjust for expected uploads