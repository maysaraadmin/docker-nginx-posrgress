apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moodle-ingress
  namespace: moodle
  annotations:
    kubernetes.io/ingress.class: nginx   # adjust to your ingress controller
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # enable TLS with cert-manager
spec:
  tls:
  - hosts:
    - moodle.localdomain
    - localhost
    secretName: moodle-tls
  rules:
  - host: moodle.localdomain   # update to your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: moodle
            port:
              number: 80
  - host: localhost   # for local development
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: moodle
            port:
              number: 80