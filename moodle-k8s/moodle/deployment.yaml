apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
  namespace: moodle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      containers:
      - name: moodle
        image: php:8.2-apache
        command:
        - /bin/sh
        - -c
        - |
          # Update Apache configuration to point to correct directory
          sed -i 's|/var/www/html|/var/www|g' /etc/apache2/sites-enabled/000-default.conf
          sed -i 's|DocumentRoot.*|DocumentRoot /var/www|g' /etc/apache2/sites-enabled/000-default.conf
          # Create index.php with Moodle info
          echo '<?php
          echo "<h1>Moodle on Kubernetes</h1>";
          echo "<h2>Status: Running Successfully!</h2>";
          echo "<h3>Database Connection:</h3>";
          try {
              $pdo = new PDO("pgsql:host=postgres;dbname=moodle", "moodle_admin", "'$($env:MOODLE_DOCKER_DB_PASSWORD)');
              echo "<p style=\"color: green;\">✅ Database connected successfully!</p>";
          } catch (PDOException $e) {
              echo "<p style=\"color: red;\">❌ Database connection failed: " . $e->getMessage() . "</p>";
          }
          echo "<h3>Environment:</h3>";
          echo "<ul>";
          echo "<li>PHP Version: " . phpversion() . "</li>";
          echo "<li>Apache Server: Running</li>";
          echo "<li>Kubernetes: Active</li>";
          echo "</ul>";
          echo "<h3>Next Steps:</h3>";
          echo "<p>1. Install Moodle files</p>";
          echo "<p>2. Configure database</p>";
          echo "<p>3. Set up admin user</p>";
          phpinfo();
          ?>' > /var/www/index.php
          # Start Apache
          apache2-foreground
        env:
        - name: MOODLE_DOCKER_DB_TYPE
          value: "pgsql"
        - name: MOODLE_DOCKER_DB_HOST
          value: "postgres"
        - name: MOODLE_DOCKER_DB_NAME
          value: "moodle"
        - name: MOODLE_DOCKER_DB_USER
          value: "moodle_admin"
        - name: MOODLE_DOCKER_DB_PORT
          value: "5432"
        - name: MOODLE_DOCKER_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: moodle-secrets
              key: db-password
        - name: MOODLE_DOCKER_ADMIN_USER
          value: "admin"
        - name: MOODLE_DOCKER_ADMIN_PASS
          valueFrom:
            secretKeyRef:
              name: moodle-secrets
              key: admin-password
        - name: MOODLE_DOCKER_ADMIN_EMAIL
          value: "admin@example.com"
        - name: MOODLE_DOCKER_AUTOINSTALL
          value: "1"
        - name: TZ
          value: "UTC"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: moodledata
          mountPath: /var/www/moodledata
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: moodledata
        persistentVolumeClaim:
          claimName: moodledata-pvc
