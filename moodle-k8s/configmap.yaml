apiVersion: v1
kind: ConfigMap
metadata:
  name: moodle-config
  namespace: moodle
data:
  # Database connection (non-secret part)
  MOODLE_DOCKER_DB_TYPE: pgsql
  MOODLE_DOCKER_DB_HOST: postgres
  MOODLE_DOCKER_DB_NAME: moodle
  MOODLE_DOCKER_DB_USER: moodle_admin
  MOODLE_DOCKER_DB_PORT: "5432"
  # Auto‑installation & admin (password comes from secret)
  MOODLE_DOCKER_AUTOINSTALL: "1"
  MOODLE_DOCKER_ADMIN_USER: admin
  MOODLE_DOCKER_ADMIN_EMAIL: admin@example.com
  TZ: UTC