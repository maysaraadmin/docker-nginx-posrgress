<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }
        
        .error-code {
            font-size: 6em;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .error-message {
            font-size: 2em;
            margin-bottom: 20px;
            font-weight: 300;
        }
        
        .error-description {
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin: 0 10px;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .links {
            margin-top: 40px;
        }
        
        .retry-btn {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        .retry-btn:hover {
            background: #45a049;
        }
        
        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.7;
            font-size: 0.9em;
        }
        
        .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">!</div>
        <div class="error-code">500</div>
        <div class="error-message">Server Error</div>
        <div class="error-description">
            Something went wrong on our end. Our team has been notified and is working to fix this issue.
            Please try again in a few moments.
        </div>
        
        <div class="links">
            <a href="javascript:history.back()" class="btn retry-btn">Try Again</a>
            <a href="/" class="btn">Go Home</a>
            <a href="/nginx-admin.html" class="btn">Check Status</a>
        </div>
    </div>
    
    <div class="footer">
        Docker Nginx PostgreSQL Setup
    </div>
</body>
</html>
